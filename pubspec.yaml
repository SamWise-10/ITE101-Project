name: tdlf_educ
description: "TDLF-Educ - Multiplatform Education App with Offline-First Architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0
  uuid: ^4.0.0
  intl: ^0.19.0
  permission_handler: ^11.4.4
  file_picker: ^6.1.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  provider: ^6.1.0
  dio: ^5.3.1
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
