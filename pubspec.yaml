name: tdlf_educ
description: "TDLF-Educ - Multiplatform Education App with Offline-First Architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0
  uuid: ^4.0.0
  intl: ^0.19.0
  permission_handler: ^12.0.3
  file_picker: ^8.0.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  provider: ^6.1.0
  dio: ^5.3.1
  connectivity_plus: ^5.0.0
  open_filex: ^4.3.2
  # Desktop (Windows/Linux) SQLite. Pinned to the prebuilt-binary line: the
  # newer sqlite3 3.x / sqlite3_flutter_libs 0.6.x compile sqlite from source
  # via "native assets", which fails to build on Windows (MSB8066). Capping
  # sqlite3 below 3.0.0 keeps the bundled-binary path that builds reliably.
  sqflite_common_ffi: ^2.3.0
  sqlite3: ">=2.0.0 <3.0.0"
  sqlite3_flutter_libs: ^0.5.0
  supabase_flutter: ^2.14.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
